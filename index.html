<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>دخول الإدارة والتهيئة 🔐</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="card animate-card">
        <h2 id="loginTitle">تسجيل دخول الحلاق 🔐</h2>
        <p id="loginNote" class="note">برجاء إدخال بيانات الإدارة للوصول للوحة التحكم</p>
        
        <hr class="divider">

        <div style="text-align: right;">
            <div id="activationArea" style="display: none;">
                <label style="color: #d4af37; font-weight: bold;">🔑 كود تفعيل السيستم (يتم الحصول عليه من المطور م/مينا):</label>
                <input type="text" id="activationKey" placeholder="أدخل كود التفعيل المعتمد">
                <hr class="divider">
            </div>

            <label>اسم المستخدم:</label>
            <input type="text" id="username" placeholder="أدخل اسم المستخدم">
            
            <label>كلمة المرور:</label>
            <input type="password" id="password" placeholder="أدخل كلمة المرور">
        </div>

        <button id="actionBtn" onclick="handleAuth()" style="margin-top: 15px;">دخول اللوحة 💻</button>
    </div>

    <script>
        // كود تفعيل السيستم السري الخاص بـ مينا (يمكنك تغييره لأي كود تحبه)
        const MINA_SECRET_KEY = "MINA-COVER-CASH-2026";

        let hasAccount = localStorage.getItem("barberUsername") !== null;

        // إذا كان أول مرة، نطلب كود التفعيل أولاً لحماية حقك
        if (!hasAccount) {
            document.getElementById("loginTitle").innerText = "تهيئة صالون جديد ✂️";
            document.getElementById("loginNote").innerText = "تنبيه: هذا السيستم محمي بحقوق الملكية. يرجى إدخال كود التفعيل والبيانات المخصصة لصالونك.";
            document.getElementById("activationArea").style.display = "block";
            document.getElementById("actionBtn").innerText = "تفعيل السيستم وإنشاء الحساب 🚀";
        }

        function handleAuth() {
            let user = document.getElementById("username").value.trim();
            let pass = document.getElementById("password").value.trim();

            if (user === "" || pass === "") {
                alert("من فضلك املأ البيانات أولاً!");
                return;
            }

            if (!hasAccount) {
                // التحقق من كود التفعيل المالي
                let enteredKey = document.getElementById("activationKey").value.trim();
                if (enteredKey !== MINA_SECRET_KEY) {
                    alert("❌ كود التفعيل غير صحيح! السيستم محمي. يرجى التواصل مع إدارة Cover Cash Store لدفع الاشتراك وتفعيل حسابك.");
                    return;
                }

                // إذا كان الكود صحيح، يتم حفظ الحساب
                localStorage.setItem("barberUsername", user);
                localStorage.setItem("barberPassword", pass);
                alert("✅ تم التحقق من الدفع وتفعيل السيستم بنجاح! يمكنك الآن تسجيل الدخول.");
                hasAccount = true;
                location.reload(); 
            } else {
                // تسجيل الدخول العادي
                let savedUser = localStorage.getItem("barberUsername");
                let savedPass = localStorage.getItem("barberPassword");

                if (user === savedUser && pass === savedPass) {
                    sessionStorage.setItem("isLoggedIn", "true");
                    
                    // طلب إذن الإشعارات فور دخول الحلاق لتهيئة المتصفح
                    if ("Notification" in window) {
                        Notification.requestPermission();
                    }
                    
                    window.location.href = "admin.html";
                } else {
                    alert("❌ البيانات غير صحيحة! رجاء المحاولة مرة أخرى.");
                }
            }
        }
    </script>

</body>
</html>
